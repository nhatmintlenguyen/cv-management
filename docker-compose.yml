services:
  app:
    image: xampp/app:8.4
    container_name: xampp-app
    ports:
      - "8080:80"
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cv_management
      DB_USERNAME: root
      DB_PASSWORD: root
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_EMAIL: no-reply@onecv.local
      MAIL_FROM_NAME: OneCV
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - .:/app
    restart: always

  db:
    image: mysql:8.0
    container_name: onecv-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cv_management
    volumes:
      - onecv-db-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: onecv-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    restart: always

  mailpit:
    image: axllent/mailpit:latest
    container_name: onecv-mailpit
    ports:
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - onecv-mailpit-data:/data
    restart: unless-stopped

volumes:
  onecv-db-data:
  onecv-mailpit-data:
