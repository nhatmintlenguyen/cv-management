services:
  app:
    image: xampp/app:8.4
    container_name: xampp-app
    ports:
      - "8080:80"
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: cv_management
      DB_USERNAME: root
      DB_PASSWORD: ""
      MAIL_HOST: host.docker.internal
      MAIL_PORT: 1025
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    restart: always
